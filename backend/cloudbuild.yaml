steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/cfdi-suite-api:$COMMIT_SHA
      - .
    dir: backend

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, 'gcr.io/$PROJECT_ID/cfdi-suite-api:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cfdi-suite-api
      - --image=gcr.io/$PROJECT_ID/cfdi-suite-api:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --timeout=1800
      # Mitigación de crashes por corrupción de heap nativo (signal 6,
      # "corrupted size vs. prev_size in fastbins") bajo alta concurrencia —
      # ver plan de estabilidad. Evita que un mismo proceso maneje varias
      # peticiones en simultáneo mientras se investiga la causa raíz.
      # NO subir de 1: probado el 2026-07-10 con concurrency=5 — el crash de
      # heap nativo (signal 6) reapareció tras ~4 min de carga real (~420 PDFs)
      # y tumbó la instancia con trabajo en curso. Hasta no identificar la
      # librería nativa culpable, 1 es obligatorio.
      - --concurrency=1
      # Mantener en paridad con .github/workflows/deploy-backend.yml — los dos
      # pipelines despliegan el mismo servicio y divergir aquí ya causó
      # incidentes (caso --set-env-vars).
      - --max-instances=10
      # --update-env-vars fusiona con las env vars existentes del servicio;
      # --set-env-vars las REEMPLAZA por completo y borra todo lo demás
      # (REDIS_*, GCS_BUCKET_NAME, SENTRY_DSN, PUSHER_*) — no usar --set-env-vars aquí.
      - --update-env-vars=ALLOWED_ORIGINS=https://cfdiinspector.vercel.app

images:
  - gcr.io/$PROJECT_ID/cfdi-suite-api:$COMMIT_SHA
