steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/cfdi-suite-api:$COMMIT_SHA
      - .
    dir: backend

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, 'gcr.io/$PROJECT_ID/cfdi-suite-api:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cfdi-suite-api
      - --image=gcr.io/$PROJECT_ID/cfdi-suite-api:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=ALLOWED_ORIGINS=https://REPLACE_WITH_VERCEL_URL

images:
  - gcr.io/$PROJECT_ID/cfdi-suite-api:$COMMIT_SHA
