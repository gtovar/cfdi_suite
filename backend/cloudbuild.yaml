steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/cfdi-suite-api:$COMMIT_SHA
      - .
    dir: backend

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, 'gcr.io/$PROJECT_ID/cfdi-suite-api:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cfdi-suite-api
      - --image=gcr.io/$PROJECT_ID/cfdi-suite-api:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --timeout=1800
      # Causa real de signal 6 encontrada y corregida 2026-07-11: generate()
      # (header WeasyPrint + tabla reportlab + merge pypdf) ahora corre
      # aislado por proceso vía PDF_PROCESS_POOL (pdf_pipeline.py), no
      # compartiendo proceso entre peticiones simultáneas. Verificado dos
      # veces en canario con mil_facturas_prueba.zip (1,600/2,000 XMLs
      # reales de Miniso): código viejo crasheó 3 veces con concurrency=5;
      # código con el fix, 2000/2000 sin error, cero crashes. Ver
      # PROJECT_STATE.md para el detalle completo. 5 es el único valor
      # probado — no subir más sin repetir la prueba de canario primero.
      - --concurrency=5
      # Mantener en paridad con .github/workflows/deploy-backend.yml — los dos
      # pipelines despliegan el mismo servicio y divergir aquí ya causó
      # incidentes (caso --set-env-vars).
      - --max-instances=10
      # --update-env-vars fusiona con las env vars existentes del servicio;
      # --set-env-vars las REEMPLAZA por completo y borra todo lo demás
      # (REDIS_*, GCS_BUCKET_NAME, SENTRY_DSN, PUSHER_*) — no usar --set-env-vars aquí.
      - --update-env-vars=ALLOWED_ORIGINS=https://cfdiinspector.vercel.app

images:
  - gcr.io/$PROJECT_ID/cfdi-suite-api:$COMMIT_SHA
